<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Navy's Fort Builder & Defender!</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e;
      font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }
    h1 { color: #fff; font-size: 1.5rem; margin: 8px 0 4px; text-shadow: 0 0 20px #00ffff; }
    #hud {
      display: flex; gap: 12px; align-items: center;
      color: #fff; font-size: 0.85rem; margin-bottom: 4px; flex-wrap: wrap; justify-content: center;
    }
    #hud span { background: rgba(255,255,255,0.12); padding: 3px 10px; border-radius: 20px; }
    .phase-btn {
      background: #00cc66; color: white; border: none;
      padding: 6px 16px; border-radius: 20px; font-family: inherit;
      font-size: 0.82rem; font-weight: bold; cursor: pointer; transition: background 0.2s;
    }
    .phase-btn:hover { background: #00aa55; }
    .phase-btn.danger { background: #ff4444; }
    .phase-btn.danger:hover { background: #cc2222; }
    #game-wrap { display: flex; gap: 0; }
    #toolbar {
      width: 86px; background: rgba(255,255,255,0.07);
      border-radius: 10px 0 0 10px; padding: 8px 6px;
      display: flex; flex-direction: column; gap: 4px;
      overflow-y: auto; max-height: 470px;
    }
    #toolbar h2 { color: #aaa; font-size: 0.58rem; text-align: center; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
    .tb-btn {
      width: 68px; height: 52px; border-radius: 9px;
      border: 2px solid transparent; cursor: pointer; font-size: 1.3rem;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: transform 0.1s, border-color 0.1s; position: relative; align-self: center;
    }
    .tb-btn .lbl { font-size: 0.48rem; color: #333; margin-top: 1px; }
    .tb-btn:hover:not(.locked) { transform: scale(1.08); }
    .tb-btn.selected { border-color: #00ffff !important; box-shadow: 0 0 8px #00ffff; }
    .tb-btn.locked { opacity: 0.35; cursor: not-allowed; filter: grayscale(0.5); }
    .tb-sep { border: none; border-top: 1px solid rgba(255,255,255,0.15); margin: 3px 0; }
    canvas { display: block; cursor: crosshair; border-radius: 0 10px 10px 0; }
  </style>
</head>
<body>

<h1>⛺ Navy's Fort Builder &amp; Defender!</h1>
<div id="hud">
  <span id="hud-level">Level 1</span>
  <span id="hud-phase">🔨 Build Phase</span>
  <span id="hud-fort">🏰 ♥♥♥</span>
  <button class="phase-btn" id="phase-btn">⚔️ Start Wave!</button>
</div>
<div id="game-wrap">
  <div id="toolbar"></div>
  <canvas id="c" width="720" height="460"></canvas>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────
const CW = 720, CH = 460;
const COLS = 36, ROWS = 23;
const TW = CW / COLS, TH = CH / ROWS;
const BUILD_COLS = 20;  // left 20 cols = build zone
const FIRE_X = BUILD_COLS * TW - 4; // projectile origin x

const BLOCK_DEFS = {
  wood:   { emoji:'🪵', color:'#c8860a', border:'#8b5a00', hp:2,  unlockLevel:1, label:'Wood' },
  hay:    { emoji:'🌾', color:'#f0d060', border:'#c8a800', hp:1,  unlockLevel:1, label:'Hay' },
  stone:  { emoji:'🪨', color:'#9e9e9e', border:'#616161', hp:4,  unlockLevel:2, label:'Stone' },
  door:   { emoji:'🚪', color:'#7c4a1e', border:'#4a2800', hp:2,  unlockLevel:3, label:'Door' },
  window: { emoji:'🪟', color:'#aaddff', border:'#5599cc', hp:2,  unlockLevel:3, label:'Window' },
  flag:   { emoji:'🚩', color:'#e84393', border:'#b00060', hp:1,  unlockLevel:4, label:'Flag' },
  trap:   { emoji:'🔥', color:'#ff8c00', border:'#cc5500', hp:999, unlockLevel:4, label:'Fire Trap', isTrap:true },
};

const WEAPON_DEFS = {
  snowball: { emoji:'❄️', label:'Snowball', damage:1, cooldown:350,  ammo:-1, unlockLevel:1, color:'#88ccff', speed:12 },
  bomb:     { emoji:'💣', label:'Bomb',     damage:5, cooldown:2500, ammo:3,  unlockLevel:2, color:'#ff6600', speed:7, aoeRadius:65 },
  zap:      { emoji:'⚡', label:'Zap Gun',  damage:9, cooldown:3500, ammo:-1, unlockLevel:3, color:'#ffff00', speed:22 },
};

const LEVEL_CONFIGS = [
  { totalAliens:6,  speed:0.40, hp:1, spawnInterval:3500 },
  { totalAliens:10, speed:0.65, hp:2, spawnInterval:2800 },
  { totalAliens:15, speed:0.90, hp:3, spawnInterval:2200 },
  { totalAliens:20, speed:1.20, hp:5, spawnInterval:1800 },
  { totalAliens:28, speed:1.55, hp:7, spawnInterval:1400 },
];

const ALIEN_EMOJIS = ['👾','👽','🤖','☠️','🛸'];

// ── STATE ────────────────────────────────────────────────────
let level = 1, fortHp = 3;
let phase = 'build'; // build | defend | levelup | win | gameover
let selectedTool = 'wood';
let grid = [];
let aliens = [], projectiles = [], particles = [];
let weaponCooldown = {}, weaponAmmo = {};
let spawnTimer = 0, spawnCount = 0;
let lastTime = 0, painting = false;

function initGrid() { grid = Array.from({length:ROWS}, () => Array(COLS).fill(null)); }
function initWeapons() {
  for (const [id,w] of Object.entries(WEAPON_DEFS)) {
    weaponCooldown[id] = 0;
    weaponAmmo[id] = w.ammo;
  }
}
initGrid(); initWeapons();

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ── TOOLBAR ──────────────────────────────────────────────────
function buildToolbar() {
  const tb = document.getElementById('toolbar');
  tb.innerHTML = '';
  const add = el => tb.appendChild(el);
  const sep = () => { const s = document.createElement('hr'); s.className='tb-sep'; add(s); };
  const h = t => { const e=document.createElement('h2'); e.textContent=t; add(e); };

  if (phase === 'build' || phase === 'levelup') {
    h('Blocks');
    for (const [id,def] of Object.entries(BLOCK_DEFS)) {
      const locked = def.unlockLevel > level;
      const btn = document.createElement('div');
      btn.className = 'tb-btn' + (id===selectedTool?' selected':'') + (locked?' locked':'');
      btn.style.background = locked ? '#444' : def.color;
      btn.innerHTML = `${def.emoji}<span class="lbl">${locked ? '🔒 Lv'+def.unlockLevel : def.label}</span>`;
      if (!locked) btn.addEventListener('click', () => { selectedTool=id; buildToolbar(); });
      add(btn);
    }
    sep();
    const eb = document.createElement('div');
    eb.className = 'tb-btn'+(selectedTool==='erase'?' selected':'');
    eb.style.background='#fff'; eb.innerHTML='✏️<span class="lbl">Erase</span>';
    eb.addEventListener('click', ()=>{ selectedTool='erase'; buildToolbar(); });
    add(eb);

  } else if (phase === 'defend') {
    h('Weapons');
    for (const [id,w] of Object.entries(WEAPON_DEFS)) {
      const locked = w.unlockLevel > level;
      const cd = weaponCooldown[id];
      const btn = document.createElement('div');
      btn.className='tb-btn'+(id===selectedTool?' selected':'')+(locked?' locked':'');
      btn.style.background = locked ? '#333' : w.color;
      const ammoTxt = locked ? '🔒 Lv'+w.unlockLevel : w.ammo===-1 ? (cd>0?`⏳${(cd/1000).toFixed(1)}s`:'∞') : `x${weaponAmmo[id]}${cd>0?' ⏳':''}`;
      btn.innerHTML = `${w.emoji}<span class="lbl">${locked?'':w.label}</span><span class="lbl">${ammoTxt}</span>`;
      if (!locked) btn.addEventListener('click', ()=>{ selectedTool=id; buildToolbar(); });
      add(btn);
    }
  }
}
buildToolbar();

// ── HUD ──────────────────────────────────────────────────────
function updateHud() {
  document.getElementById('hud-level').textContent = `Level ${level}`;
  const phases = { build:'🔨 Build Phase', defend:'⚔️ Defend!', levelup:'🎉 Wave Clear!', win:'🏆 YOU WIN!', gameover:'💀 Game Over' };
  document.getElementById('hud-phase').textContent = phases[phase] || '';
  document.getElementById('hud-fort').textContent = '🏰 '+'♥'.repeat(Math.max(0,fortHp))+'♡'.repeat(Math.max(0,3-fortHp));
  const btn = document.getElementById('phase-btn');
  const map = { build:['⚔️ Start Wave!',''], levelup:['➡️ Next Level!',''], win:['🔄 Play Again!','danger'], gameover:['🔄 Play Again!','danger'] };
  if (map[phase]) {
    btn.textContent = map[phase][0];
    btn.className = 'phase-btn ' + map[phase][1];
    btn.style.display = '';
  } else btn.style.display='none';
}

document.getElementById('phase-btn').addEventListener('click', () => {
  if (phase==='build') startDefend();
  else if (phase==='levelup') startNextLevel();
  else if (phase==='win'||phase==='gameover') resetGame();
});

// ── FLOW ─────────────────────────────────────────────────────
function startDefend() {
  phase='defend'; selectedTool='snowball';
  aliens=[]; projectiles=[]; particles=[];
  spawnTimer=0; spawnCount=0;
  initWeapons();
  updateHud(); buildToolbar();
}

function startNextLevel() {
  level = Math.min(level+1, LEVEL_CONFIGS.length);
  phase = level > LEVEL_CONFIGS.length ? 'win' : 'build';
  fortHp = Math.min(3, fortHp+1);
  selectedTool = 'wood';
  updateHud(); buildToolbar();
}

function resetGame() {
  level=1; fortHp=3; phase='build'; selectedTool='wood';
  initGrid(); aliens=[]; projectiles=[]; particles=[];
  updateHud(); buildToolbar();
}

// ── PARTICLES ────────────────────────────────────────────────
function burst(x, y, color, n=12, size=6) {
  for (let i=0;i<n;i++) {
    const a = Math.random()*Math.PI*2, sp = 1+Math.random()*3;
    particles.push({ x, y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, life:1, color, size:size*(0.5+Math.random()) });
  }
}

// ── ALIEN ────────────────────────────────────────────────────
class Alien {
  constructor() {
    const cfg = LEVEL_CONFIGS[level-1];
    this.x = CW + 30 + Math.random()*40;
    this.row = 1 + Math.floor(Math.random()*(ROWS-3));
    this.y = this.row*TH + TH/2;
    this.speed = cfg.speed * (0.85 + Math.random()*0.3);
    this.hp = cfg.hp; this.maxHp = cfg.hp;
    this.emoji = ALIEN_EMOJIS[Math.floor(Math.random()*ALIEN_EMOJIS.length)];
    this.dead = false; this.flashTimer = 0; this.attackCooldown = 0;
    this.size = Math.min(TW,TH)*0.85;
    this.bobOffset = Math.random()*Math.PI*2;
  }

  hit(dmg) {
    this.hp -= dmg;
    this.flashTimer = 250;
    if (this.hp <= 0) {
      this.dead = true;
      burst(this.x, this.y, '#ffff00', 16, 8);
    } else {
      burst(this.x, this.y, '#ff4444', 6, 4);
    }
  }

  update(dt) {
    if (this.dead) return;
    this.flashTimer = Math.max(0, this.flashTimer-dt);
    this.attackCooldown = Math.max(0, this.attackCooldown-dt);

    // Find block ahead
    const col = Math.floor(this.x / TW);
    const row = this.row;
    let blocked = false;
    for (let c = Math.max(0,col-1); c <= col && c < BUILD_COLS; c++) {
      if (grid[row] && grid[row][c]) {
        const cell = grid[row][c];
        const def = BLOCK_DEFS[cell.type];
        if (def && def.isTrap) {
          // fire trap damages alien passively
          this.hp -= 0.08*(dt/16);
          burst(this.x, this.y, '#ff8c00', 1, 5);
          if (this.hp <= 0) { this.dead=true; burst(this.x,this.y,'#ff4400',20,10); }
        } else {
          blocked = true;
          if (this.attackCooldown <= 0) {
            this.attackCooldown = 700;
            cell.hp--;
            burst(c*TW+TW/2, row*TH+TH/2, '#ff6600', 8, 6);
            if (cell.hp <= 0) grid[row][c] = null;
          }
        }
      }
    }

    if (!blocked) {
      this.x -= this.speed*(dt/16);
    }

    // Reached left wall
    if (this.x < -10) {
      this.dead = true;
      fortHp--;
      burst(10, this.y, '#ff0000', 30, 12);
      updateHud();
      if (fortHp <= 0) { phase='gameover'; updateHud(); buildToolbar(); }
    }
  }

  draw() {
    if (this.dead) return;
    const bob = Math.sin(Date.now()*0.003 + this.bobOffset)*3;
    ctx.save();
    if (this.flashTimer > 0) {
      ctx.globalAlpha = 0.4 + Math.abs(Math.sin(this.flashTimer*0.04))*0.6;
    }
    ctx.font = `${this.size}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(this.emoji, this.x, this.y + bob);
    if (this.hp < this.maxHp) {
      const bw = this.size, bx = this.x-bw/2, by = this.y+bob - this.size/2 - 7;
      ctx.fillStyle = '#333'; ctx.fillRect(bx, by, bw, 5);
      ctx.fillStyle = `hsl(${120*(this.hp/this.maxHp)},100%,50%)`;
      ctx.fillRect(bx, by, bw*(this.hp/this.maxHp), 5);
    }
    ctx.restore();
  }
}

// ── PROJECTILE ────────────────────────────────────────────────
class Projectile {
  constructor(tx, ty, id) {
    const w = WEAPON_DEFS[id];
    this.x = FIRE_X; this.y = CH/2;
    const dx=tx-this.x, dy=ty-this.y, d=Math.sqrt(dx*dx+dy*dy)||1;
    this.vx = (dx/d)*w.speed; this.vy = (dy/d)*w.speed;
    this.id = id; this.dead = false;
    this.color = w.color; this.damage = w.damage;
    this.aoeRadius = w.aoeRadius || 0;
    this.emoji = w.emoji; this.trail = [];
  }

  update() {
    this.trail.push({x:this.x, y:this.y});
    if (this.trail.length > 10) this.trail.shift();
    this.x += this.vx; this.y += this.vy;
    if (this.x > CW+30 || this.x < -30 || this.y < -30 || this.y > CH+30) { this.dead=true; return; }

    for (const a of aliens) {
      if (a.dead) continue;
      const dx=a.x-this.x, dy=a.y-this.y;
      if (Math.sqrt(dx*dx+dy*dy) < TH*0.55) {
        if (this.aoeRadius > 0) {
          for (const a2 of aliens) {
            if (a2.dead) continue;
            const dx2=a2.x-this.x, dy2=a2.y-this.y;
            if (Math.sqrt(dx2*dx2+dy2*dy2) < this.aoeRadius) a2.hit(this.damage);
          }
          burst(this.x, this.y, '#ff8800', 30, 14);
        } else {
          a.hit(this.damage);
        }
        this.dead = true;
        return;
      }
    }
  }

  draw() {
    for (let i=0;i<this.trail.length;i++) {
      ctx.save();
      ctx.globalAlpha = (i/this.trail.length)*0.45;
      ctx.fillStyle = this.color;
      ctx.beginPath(); ctx.arc(this.trail[i].x, this.trail[i].y, 4, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
    ctx.font = `${TH*0.65}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(this.emoji, this.x, this.y);
  }
}

// ── INPUT ────────────────────────────────────────────────────
function canvasPos(e) {
  const r = canvas.getBoundingClientRect();
  return { x:(e.clientX-r.left)*(CW/r.width), y:(e.clientY-r.top)*(CH/r.height) };
}

function handleInput(e) {
  const {x,y} = canvasPos(e);
  if (phase==='build') {
    const col=Math.floor(x/TW), row=Math.floor(y/TH);
    if (col<0||col>=BUILD_COLS||row<0||row>=ROWS) return;
    if (selectedTool==='erase') { grid[row][col]=null; return; }
    const def = BLOCK_DEFS[selectedTool];
    if (!def||def.unlockLevel>level) return;
    grid[row][col] = { type:selectedTool, hp:def.hp };
  } else if (phase==='defend') {
    const w = WEAPON_DEFS[selectedTool];
    if (!w||w.unlockLevel>level) return;
    if (weaponCooldown[selectedTool]>0) return;
    if (w.ammo!==-1&&weaponAmmo[selectedTool]<=0) return;
    projectiles.push(new Projectile(x, y, selectedTool));
    weaponCooldown[selectedTool] = w.cooldown;
    if (w.ammo!==-1) weaponAmmo[selectedTool]--;
    buildToolbar();
  }
}

canvas.addEventListener('mousedown', e=>{ painting=true; handleInput(e); });
canvas.addEventListener('mousemove', e=>{ if(painting&&phase==='build') handleInput(e); });
window.addEventListener('mouseup', ()=>painting=false);
canvas.addEventListener('touchstart', e=>{ e.preventDefault(); painting=true; handleInput(e.touches[0]); },{passive:false});
canvas.addEventListener('touchmove', e=>{ e.preventDefault(); if(painting&&phase==='build') handleInput(e.touches[0]); },{passive:false});
window.addEventListener('touchend', ()=>painting=false);

// ── DRAW ─────────────────────────────────────────────────────
function drawBg() {
  const sky = ctx.createLinearGradient(0,0,0,CH);
  if (phase==='defend') { sky.addColorStop(0,'#0d0d1e'); sky.addColorStop(1,'#1a0a2e'); }
  else { sky.addColorStop(0,'#87CEEB'); sky.addColorStop(1,'#c9e8f7'); }
  ctx.fillStyle=sky; ctx.fillRect(0,0,CW,CH);

  // ground
  ctx.fillStyle = phase==='defend' ? '#1e3a0e' : '#5cb02e';
  ctx.fillRect(0, CH-TH, CW, TH);
  ctx.fillStyle = phase==='defend' ? '#2d5018' : '#6db33f';
  ctx.fillRect(0, CH-TH+2, CW, 6);

  if (phase==='defend') {
    // stars
    ctx.fillStyle='rgba(255,255,255,0.7)';
    for(let i=0;i<50;i++){
      const sx=(i*173+7)%CW, sy=(i*97+3)%(CH*0.65);
      const s=Math.sin(Date.now()*0.002+i)*0.4+0.6;
      ctx.globalAlpha=s*0.8;
      ctx.fillRect(sx,sy,1.5,1.5);
    }
    ctx.globalAlpha=1;
  } else {
    // clouds
    ctx.fillStyle='rgba(255,255,255,0.7)';
    const t = Date.now()*0.00005;
    [[120,40,60],[300,25,80],[500,50,50]].forEach(([bx,by,bw])=>{
      const cx=(bx+t*CW*0.3)%CW;
      ctx.beginPath(); ctx.ellipse(cx,by,bw,18,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx-20,by+5,30,14,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx+25,by+8,25,12,0,0,Math.PI*2); ctx.fill();
    });
  }
}

function drawBuildZone() {
  if (phase!=='build') return;
  ctx.fillStyle='rgba(255,255,200,0.06)';
  ctx.fillRect(0,0,BUILD_COLS*TW,CH);
  ctx.strokeStyle='rgba(255,255,100,0.4)';
  ctx.setLineDash([5,5]); ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(BUILD_COLS*TW,0); ctx.lineTo(BUILD_COLS*TW,CH); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='rgba(255,255,150,0.45)';
  ctx.font='10px Comic Sans MS,cursive'; ctx.textAlign='left';
  ctx.fillText('← Build Your Fort Here',4,13);
}

function drawGrid() {
  if (phase!=='build') return;
  ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=0.5;
  for(let c=0;c<=BUILD_COLS;c++){
    ctx.beginPath(); ctx.moveTo(c*TW,0); ctx.lineTo(c*TW,CH); ctx.stroke();
  }
  for(let r=0;r<=ROWS;r++){
    ctx.beginPath(); ctx.moveTo(0,r*TH); ctx.lineTo(BUILD_COLS*TW,r*TH); ctx.stroke();
  }
}

function drawBlocks() {
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) {
    const cell=grid[r][c]; if(!cell) continue;
    const def=BLOCK_DEFS[cell.type]; if(!def) continue;
    const x=c*TW, y=r*TH;
    ctx.fillStyle=def.color; ctx.strokeStyle=def.border; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.roundRect(x+1,y+1,TW-2,TH-2,3); ctx.fill(); ctx.stroke();
    ctx.font=`${Math.min(TW,TH)*0.72}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(def.emoji, x+TW/2, y+TH/2);
    if(cell.hp < def.hp && def.hp > 1) {
      for(let h=0;h<def.hp;h++){
        ctx.fillStyle = h<cell.hp?'#44ff44':'#ff2222';
        ctx.fillRect(x+2+h*5, y+TH-5, 4, 4);
      }
    }
  }
}

function drawParticles() {
  for(const p of particles) {
    ctx.save(); ctx.globalAlpha=p.life*0.85;
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function drawDefendUI() {
  if(phase!=='defend') return;
  const now=Date.now();
  const pulse=Math.sin(now*0.004)*0.5+0.5;
  ctx.save(); ctx.globalAlpha=0.35+pulse*0.45;
  ctx.fillStyle='#ff3333';
  ctx.font='bold 14px Comic Sans MS,cursive'; ctx.textAlign='right';
  ctx.fillText('👾 ALIENS INCOMING →', CW-6, 20);
  ctx.restore();

  // Cooldown bar for selected weapon
  const w=WEAPON_DEFS[selectedTool];
  if(w && weaponCooldown[selectedTool]>0) {
    const ratio=1-(weaponCooldown[selectedTool]/w.cooldown);
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(FIRE_X-60, CH-22, 120, 10);
    ctx.fillStyle='#00ffff'; ctx.fillRect(FIRE_X-60, CH-22, 120*ratio, 10);
    ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.strokeRect(FIRE_X-60, CH-22, 120, 10);
    ctx.fillStyle='#fff'; ctx.font='8px sans-serif'; ctx.textAlign='center';
    ctx.fillText('RELOADING', FIRE_X, CH-14);
  }
}

function drawOverlay() {
  if(phase==='gameover') {
    ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(0,0,CW,CH);
    ctx.textAlign='center';
    ctx.fillStyle='#ff4444'; ctx.font='bold 44px Comic Sans MS,cursive';
    ctx.fillText('💀 FORT DESTROYED! 💀', CW/2, CH/2-20);
    ctx.fillStyle='#fff'; ctx.font='22px Comic Sans MS,cursive';
    ctx.fillText(`You made it to Level ${level}!`, CW/2, CH/2+24);
  } else if(phase==='levelup') {
    ctx.fillStyle='rgba(0,30,0,0.65)'; ctx.fillRect(0,0,CW,CH);
    ctx.textAlign='center';
    ctx.fillStyle='#00ff88'; ctx.font='bold 42px Comic Sans MS,cursive';
    ctx.fillText(`🎉 Wave ${level} Clear! 🎉`, CW/2, CH/2-24);
    const nextLv = level+1;
    const newStuff = [
      ...Object.entries(BLOCK_DEFS).filter(([,d])=>d.unlockLevel===nextLv).map(([,d])=>d.emoji+d.label),
      ...Object.entries(WEAPON_DEFS).filter(([,d])=>d.unlockLevel===nextLv).map(([,d])=>d.emoji+d.label),
    ];
    if(newStuff.length) {
      ctx.fillStyle='#ffff66'; ctx.font='18px Comic Sans MS,cursive';
      ctx.fillText('🔓 Unlocked: '+newStuff.join('  '), CW/2, CH/2+16);
    }
    ctx.fillStyle='#aaffaa'; ctx.font='16px Comic Sans MS,cursive';
    ctx.fillText('♥ Fort repaired! Click Next Level to rebuild.', CW/2, CH/2+44);
  } else if(phase==='win') {
    ctx.fillStyle='rgba(0,0,40,0.72)'; ctx.fillRect(0,0,CW,CH);
    ctx.textAlign='center';
    ctx.fillStyle='#ffd700'; ctx.font='bold 46px Comic Sans MS,cursive';
    ctx.fillText('🏆 YOU WIN, NAVY! 🏆', CW/2, CH/2-20);
    ctx.fillStyle='#fff'; ctx.font='22px Comic Sans MS,cursive';
    ctx.fillText('You defeated ALL the aliens! Amazing!', CW/2, CH/2+24);
  }
}

// ── GAME LOOP ─────────────────────────────────────────────────
function loop(ts) {
  const dt = Math.min(ts-lastTime, 60);
  lastTime = ts;

  // Update cooldowns
  if(phase==='defend') {
    for(const id of Object.keys(weaponCooldown)) weaponCooldown[id]=Math.max(0,weaponCooldown[id]-dt);
  }

  // Spawn aliens
  if(phase==='defend') {
    const cfg=LEVEL_CONFIGS[level-1];
    spawnTimer-=dt;
    if(spawnTimer<=0 && spawnCount<cfg.totalAliens) {
      aliens.push(new Alien()); spawnCount++; spawnTimer=cfg.spawnInterval;
    }
    for(const a of aliens) a.update(dt);
    aliens = aliens.filter(a=>!a.dead);
    for(const p of projectiles) p.update();
    projectiles = projectiles.filter(p=>!p.dead);

    if(phase==='defend' && spawnCount>=cfg.totalAliens && aliens.length===0) {
      if(level>=LEVEL_CONFIGS.length) { phase='win'; } else { phase='levelup'; }
      updateHud(); buildToolbar();
    }
    buildToolbar(); // refresh cooldown display
  }

  // Update particles
  for(const p of particles) {
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.life-=dt/600;
  }
  particles=particles.filter(p=>p.life>0);

  // Draw
  drawBg(); drawBuildZone(); drawGrid(); drawBlocks();
  drawParticles();
  if(phase==='defend') { for(const p of projectiles) p.draw(); for(const a of aliens) a.draw(); drawDefendUI(); }
  drawOverlay();

  requestAnimationFrame(loop);
}

updateHud();
requestAnimationFrame(ts => { lastTime=ts; requestAnimationFrame(loop); });
</script>
